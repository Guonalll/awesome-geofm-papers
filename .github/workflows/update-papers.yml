name: Update GeoFM papers

on:
  schedule:
    - cron: "0 * * * *"   # 每小时自动运行
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update papers
        run: python scripts/update_papers.py

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update GeoFM papers"
          file_pattern: README.md data/papers.json data/papers.csv data/run_summary.json
